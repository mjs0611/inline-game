name: Deploy to AIT Console

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Setup AIT credentials
        run: |
          mkdir -p ~/.ait
          printf '{"default":"%s"}' "$AIT_TOKEN" > ~/.ait/credentials
        env:
          AIT_TOKEN: ${{ secrets.AIT_TOKEN }}

      - name: Build and Deploy
        run: npx ait build && npx ait deploy -m "auto deploy [GitHub Actions]"
