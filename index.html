<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>In Line</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="score">0<span>m</span></div>
  <div id="coinCountHUD" class="coin-hud">
    <img src="/assets/coin.png" class="coin-img"><span id="sessionCoinVal">0</span>
  </div>
</div>

<!-- Item HUD (Icons for active power-ups) -->
<div id="itemHUD">
  <div id="shieldIcon" class="powerup-icon" style="display:none">🛡️</div>
  <div id="slowmoIcon" class="powerup-icon" style="display:none">⏳</div>
</div>

<!-- Intro -->
<div id="intro">
  <div id="gameTitle">In Line</div>
  <div id="gameSub">Dodge · Survive · Escape</div>
  <div class="intro-btns">
    <button id="startBtn">START</button>
    <button id="shopBtn">SHOP</button>
  </div>
</div>

<!-- Shop Modal -->
<div id="shopOverlay">
  <div id="shopBox">
    <div id="shopHeader">
      <h2>Shop</h2>
      <div class="coin-balance"><img src="/assets/coin.png" class="coin-img"> <span id="shopCoinVal">0</span></div>
    </div>
    <div class="shop-content">
      <div class="sku-grid" id="playerSkinsGrid"></div>
    </div>
    <div class="shop-footer">
      <button id="shopCloseBtn">닫기</button>
    </div>
  </div>
</div>

<!-- Game Over -->
<div id="gameOver">
  <div id="goLabel">GAME OVER</div>
  <div id="goScore">0</div>
  <div id="goUnit">METERS</div>
  <div id="goBest"></div>
  <div class="go-coins">획득 코인 <img src="/assets/coin.png" class="coin-img"> <span id="goCoins">0</span></div>
  <button class="goBtn primary" id="continueBtn">이어하기 (광고 시청)</button>
  <button class="goBtn gold" id="doubleCoinsBtn">🎥 코인 2배 받기</button>
  <button class="goBtn secondary" id="retryBtn">처음부터</button>
  <button class="goBtn secondary" id="leaderboardBtn">리더보드 보기</button>
</div>

<!-- Direction change pulse overlay -->
<div id="dirPulse"></div>

<!-- Close confirmation -->
<div id="closeConfirm">
  <div id="closeBox">
    <div id="closeMsg">게임을 종료할까요?</div>
    <div class="closeBtns">
      <button id="closeNo">계속하기</button>
      <button id="closeYes">종료</button>
    </div>
  </div>
</div>

<!-- Ad fallback (AIT 미지원 환경 전용) -->
<div id="adScreen">
  <div id="adTag">ADVERTISEMENT</div>
  <div id="adBox"><div id="adCount">5</div></div>
  <div id="adSub">잠시 후 게임이 시작됩니다</div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
